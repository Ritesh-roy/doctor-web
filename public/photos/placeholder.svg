<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Sanjeevani Clinic Private Limited">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7f5ee"/>
      <stop offset="55%" stop-color="#b7ecdf"/>
      <stop offset="100%" stop-color="#8bd8c4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#glow)"/>
  <!-- soft floating circles for depth -->
  <circle cx="120" cy="130" r="80" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="700" cy="680" r="120" fill="#ffffff" fill-opacity="0.18"/>
  <circle cx="670" cy="140" r="45" fill="#ffffff" fill-opacity="0.22"/>
  <!-- medical cross mark, centered -->
  <g transform="translate(400 400)">
    <circle r="150" fill="#ffffff" fill-opacity="0.35"/>
    <circle r="115" fill="#ffffff" fill-opacity="0.55"/>
    <g fill="#0f7b6c">
      <rect x="-24" y="-84" width="48" height="168" rx="14"/>
      <rect x="-84" y="-24" width="168" height="48" rx="14"/>
    </g>
  </g>
</svg>
